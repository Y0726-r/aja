<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>通勤HPメーター 削除機能あり</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#fff8fc;color:#2d2633;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
header{padding:16px}
h1{font-size:22px;margin:0 0 6px}
.sub,p{font-size:13px;color:#766b77;line-height:1.5}
main{padding:0 12px 50px;max-width:720px;margin:auto}
.card{background:#fff;border:1px solid #ffe0ee;border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 5px 18px rgba(255,105,180,.12)}
.nav{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.nav a{display:block;text-align:center;text-decoration:none;background:#ff69b4;color:#fff;padding:12px;border-radius:12px;font-weight:800}
h2{font-size:18px;margin:0 0 10px}
.routeWrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 0}
.route{display:flex;position:relative;min-width:1850px;padding-top:22px}
.route:before{content:"";position:absolute;left:30px;right:30px;top:36px;height:10px;background:#ff9ac7;border-radius:999px}
.station{position:relative;z-index:1;width:74px;flex:0 0 74px;text-align:center}
.dot{width:24px;height:24px;border-radius:50%;border:6px solid #ff69b4;background:#fff;margin:0 auto 8px}
.name{font-weight:800;font-size:12px;line-height:1.3;height:48px}
.level{width:52px;padding:6px;border-radius:8px;border:1px solid #e9d7e1}
.meter{width:18px;height:72px;margin:8px auto;background:#f2e6ed;border-radius:999px;overflow:hidden;display:flex;align-items:flex-end}
.fill{width:100%;background:#ff3366;border-radius:999px 999px 0 0}
.note{width:68px;height:48px;font-size:11px;padding:5px;border:1px solid #ead9e3;border-radius:8px}
button{width:100%;border:0;border-radius:14px;padding:14px;background:#ff69b4;color:white;font-weight:900;font-size:16px;margin-top:10px}
button.white{background:#fff;color:#ff4f9f;border:1px solid #ff9ac7}
button.delete{background:#fff0f6;color:#d60057;border:1px solid #ff9ac7;padding:8px;font-size:13px;margin-top:8px}
button.deleteAll{background:#d60057;color:#fff}
label{display:block;margin:10px 0 4px;font-size:12px;color:#766b77}
input,select,textarea{width:100%;border:1px solid #ead9e3;border-radius:12px;padding:10px;font-size:15px;background:white}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pill{display:inline-block;background:#fff0f7;color:#b91f5c;border-radius:999px;padding:4px 8px;margin:2px;font-size:12px}
.history{border-top:1px solid #f0dbe7;padding:10px 0}
.big{font-size:30px;color:#ff69b4;font-weight:900}
</style>
</head>
<body>
<header>
<h1>通勤HPメーター ฅ^•ω•^ฅ</h1>
<div class="sub">鶴瀬→銀座一丁目｜路線図＋1ヶ月ログ｜削除機能あり</div>
<div class="nav">
<a href="#route">路線図</a>
<a href="#today">今日</a>
<a href="#month" id="monthLink">1ヶ月</a>
</div>
</header>

<main>
<section id="route" class="card">
<h2>路線図＋駅ごとの辛さ</h2>
<p>横にスワイプ。辛さ度を変えて保存できるにゃ。</p>
<div class="routeWrap"><div class="route" id="routeBox"></div></div>
<button id="saveStations">駅データを保存</button>
</section>

<section id="today" class="card">
<h2>今日のログ</h2>
<div class="row">
<div><label>日付</label><input type="date" id="date"></div>
<div><label>車両</label><select id="car"><option>2号車</option><option>4号車</option><option selected>10号車</option><option>その他</option></select></div>
</div>
<div class="row">
<div><label>座れた？</label><select id="seat"><option>座れた</option><option>途中から座れた</option><option>座れない</option></select></div>
<div><label>HP削れ度</label><select id="hp"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
</div>
<label>メモ</label>
<textarea id="memo" placeholder="例：10号車は座れた。東池袋〜護国寺が地獄。"></textarea>
<button id="saveRide">今日のログを保存</button>
</section>

<section id="month" class="card">
<h2>1ヶ月データ</h2>
<div class="row">
<div class="card"><div>記録数</div><div id="days" class="big">0</div></div>
<div class="card"><div>平均HP</div><div id="avg" class="big">-</div></div>
</div>
<div id="summary"></div>
<h2>履歴</h2>
<div id="history"></div>
<button class="white" id="refresh">1ヶ月データを更新</button>
<button class="deleteAll" id="clearRides">今日のログ履歴を全部削除</button>
<button class="delete" id="clearStations">駅データを全部リセット</button>
</section>
</main>

<script>
const stations=["鶴瀬","みずほ台","柳瀬川","志木","朝霞台","朝霞","和光市","地下鉄成増","地下鉄赤塚","平和台","氷川台","小竹向原","千川","要町","池袋","東池袋","護国寺","江戸川橋","飯田橋","市ケ谷","麹町","永田町","桜田門","有楽町","銀座一丁目"];
const def={"鶴瀬":2,"志木":4,"池袋":5,"東池袋":5,"護国寺":5,"江戸川橋":4,"飯田橋":2,"有楽町":1,"銀座一丁目":1};
const pre="commute_hp_delete_v1_";

function L(k,f){try{return JSON.parse(localStorage.getItem(pre+k))??f}catch(e){return f}}
function S(k,v){localStorage.setItem(pre+k,JSON.stringify(v))}
function esc(s){return String(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
document.getElementById("date").value=today();

function makeRoute(){
  const saved=L("stations",{});
  routeBox.innerHTML=stations.map((name,i)=>{
    const item=saved[name]||{level:def[name]||2,note:""};
    let opts="";
    for(let n=1;n<=5;n++) opts+=`<option value="${n}" ${n==item.level?"selected":""}>${n}</option>`;
    return `<div class="station" data-name="${esc(name)}">
      <div class="dot"></div>
      <div class="name">${i+1}. ${esc(name)}</div>
      <select class="level">${opts}</select>
      <div class="meter"><div class="fill"></div></div>
      <textarea class="note" placeholder="メモ">${esc(item.note)}</textarea>
    </div>`;
  }).join("");
  document.querySelectorAll(".level").forEach(x=>x.addEventListener("change",updateMeters));
  updateMeters();
}

function updateMeters(){
  document.querySelectorAll(".station").forEach(st=>{
    const lv=Number(st.querySelector(".level").value);
    const f=st.querySelector(".fill");
    f.style.height=(lv*20)+"%";
    f.style.background=lv==1?"#8fd19e":lv==2?"#b7d96a":lv==3?"#ffbf69":lv==4?"#ff7b93":"#ff3366";
  });
}

saveStations.onclick=()=>{
  const data={};
  document.querySelectorAll(".station").forEach(st=>{
    data[st.dataset.name]={level:Number(st.querySelector(".level").value),note:st.querySelector(".note").value};
  });
  S("stations",data);
  alert("駅データ保存したにゃん！");
};

saveRide.onclick=()=>{
  const rides=L("rides",[]);
  rides.unshift({date:date.value,car:car.value,seat:seat.value,hp:Number(hp.value),memo:memo.value,created:Date.now()});
  S("rides",rides);
  memo.value="";
  alert("今日のログ保存したにゃん！");
  renderMonth();
};

function deleteRide(i){
  const rides=L("rides",[]);
  rides.splice(i,1);
  S("rides",rides);
  renderMonth();
}

function renderMonth(){
  const rides=L("rides",[]);
  const cutoff=Date.now()-31*24*60*60*1000;
  const recent=rides.filter(r=>new Date(r.date).getTime()>=cutoff);
  days.textContent=recent.length;
  avg.textContent=recent.length?(recent.reduce((a,b)=>a+Number(b.hp),0)/recent.length).toFixed(1):"-";
  const by={};
  recent.forEach(r=>{by[r.car]??=[];by[r.car].push(r)});
  summary.innerHTML=Object.keys(by).map(c=>{
    const arr=by[c];
    const av=(arr.reduce((a,b)=>a+Number(b.hp),0)/arr.length).toFixed(1);
    const seat=Math.round(arr.filter(r=>String(r.seat).includes("座れた")).length/arr.length*100);
    return `<div class="history"><b>${esc(c)}</b><br><span class="pill">平均HP ${av}</span><span class="pill">座れた率 ${seat}%</span><span class="pill">${arr.length}件</span></div>`;
  }).join("")||"<div class='history'>まだデータなしにゃ。</div>";
  history.innerHTML=recent.map((r,i)=>`<div class="history">
    <b>${esc(r.date)}｜${esc(r.car)}</b><br>
    <span class="pill">${esc(r.seat)}</span><span class="pill">HP ${esc(r.hp)}</span>
    <div>${esc(r.memo)}</div>
    <button class="delete" onclick="deleteRide(${i})">この記録を削除</button>
  </div>`).join("")||"<div class='history'>まだ履歴なしにゃ。</div>";
}

refresh.onclick=renderMonth;
monthLink.onclick=()=>setTimeout(renderMonth,50);

clearRides.onclick=()=>{
  if(confirm("今日のログ履歴を全部消すにゃ？")){
    localStorage.removeItem(pre+"rides");
    renderMonth();
  }
};

clearStations.onclick=()=>{
  if(confirm("駅データを全部リセットするにゃ？")){
    localStorage.removeItem(pre+"stations");
    makeRoute();
  }
};

makeRoute();
renderMonth();
</script>
</body>
</html>
